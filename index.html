<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パーソナル・タロット占い</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(107,63,160,0.35) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(212,175,55,0.18) 0%, transparent 50%),
    linear-gradient(135deg, #0a0420 0%, #1a0a3a 50%, #0a0420 100%);
  background-attachment: fixed;
  color: #f4e4bc;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  padding: 32px 20px 64px;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(1px 1px at 60% 70%, white, transparent),
    radial-gradient(1px 1px at 50% 20%, rgba(255,255,255,0.5), transparent),
    radial-gradient(2px 2px at 80% 10%, white, transparent),
    radial-gradient(1px 1px at 90% 60%, white, transparent),
    radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.6), transparent),
    radial-gradient(2px 2px at 70% 90%, white, transparent),
    radial-gradient(1px 1px at 10% 50%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.5), transparent);
  pointer-events: none;
  z-index: 0;
  animation: twinkle 4s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 0.4; }
}
.container {
  max-width: 980px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
h1 {
  text-align: center;
  font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
  font-size: 30px;
  font-weight: 300;
  letter-spacing: 0.3em;
  margin-bottom: 8px;
  color: #d4af37;
  text-shadow: 0 0 24px rgba(212,175,55,0.5);
}
.subtitle {
  text-align: center;
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 12px;
  letter-spacing: 0.4em;
  color: rgba(244,228,188,0.65);
  margin-bottom: 48px;
}
.stage { display: none; }
.stage.active { display: block; animation: fadeIn 0.6s ease-out; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Form */
.form-wrap {
  max-width: 540px;
  margin: 0 auto;
  background: linear-gradient(135deg, rgba(42,14,90,0.45) 0%, rgba(10,4,32,0.6) 100%);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 16px;
  padding: 36px 32px;
}
.form-prompt {
  text-align: center;
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 17px;
  margin-bottom: 28px;
  color: #f4e4bc;
  letter-spacing: 0.1em;
}
.field { margin-bottom: 22px; }
.field label, .field legend {
  display: block;
  font-size: 13px;
  letter-spacing: 0.15em;
  color: #d4af37;
  margin-bottom: 8px;
  font-family: "Hiragino Mincho ProN", serif;
}
.field input[type="text"],
.field input[type="date"],
.field textarea {
  width: 100%;
  padding: 12px 14px;
  background: rgba(10, 4, 32, 0.5);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 8px;
  color: #f4e4bc;
  font-family: inherit;
  font-size: 15px;
  transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus {
  outline: none;
  border-color: #d4af37;
  box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
}
.field textarea { resize: vertical; min-height: 70px; }
.field input::placeholder, .field textarea::placeholder {
  color: rgba(244,228,188,0.35);
}
.theme-radio {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.theme-radio label {
  display: block;
  position: relative;
  padding: 14px 10px;
  background: rgba(10, 4, 32, 0.4);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: #f4e4bc;
  margin: 0;
}
.theme-radio label .ico {
  display: block;
  font-size: 22px;
  margin-bottom: 6px;
}
.theme-radio input { display: none; }
.theme-radio label:hover { border-color: rgba(212,175,55,0.6); }
.theme-radio label.checked {
  border-color: #d4af37;
  background: linear-gradient(135deg, rgba(107,63,160,0.4) 0%, rgba(212,175,55,0.15) 100%);
  box-shadow: 0 0 12px rgba(212,175,55,0.25);
}
.btn-primary {
  display: block;
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  background: linear-gradient(135deg, #d4af37 0%, #b8902a 100%);
  border: none;
  border-radius: 30px;
  color: #1a0a3a;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.3em;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(212,175,55,0.4);
}

/* Selection stage */
.greeting {
  text-align: center;
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 18px;
  margin-bottom: 6px;
  letter-spacing: 0.1em;
  color: #f4e4bc;
}
.hint {
  text-align: center;
  color: rgba(244,228,188,0.7);
  font-size: 13px;
  letter-spacing: 0.2em;
  margin-bottom: 18px;
}
.counter {
  text-align: center;
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 24px;
  letter-spacing: 0.2em;
  color: #d4af37;
  margin-bottom: 24px;
}
.theme-tag {
  display: inline-block;
  padding: 6px 18px;
  background: rgba(212,175,55,0.15);
  border: 1px solid rgba(212,175,55,0.4);
  border-radius: 20px;
  font-size: 12px;
  letter-spacing: 0.25em;
  color: #d4af37;
}
.theme-tag-wrap { text-align: center; margin-bottom: 16px; }
.card-pool {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 10px;
  max-width: 820px;
  margin: 0 auto 28px;
  padding: 8px;
}
.mini-card {
  position: relative;
  aspect-ratio: 2 / 3;
  border-radius: 8px;
  background:
    radial-gradient(circle at center, rgba(212,175,55,0.3) 0%, transparent 70%),
    linear-gradient(135deg, #2a0e5a 0%, #1a0a3a 50%, #2a0e5a 100%);
  border: 1px solid #d4af37;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.mini-card::before {
  content: '✦';
  font-size: 26px;
  color: #d4af37;
  text-shadow: 0 0 8px rgba(212,175,55,0.6);
}
.mini-card:hover:not(.selected):not(.locked) {
  transform: translateY(-6px);
  box-shadow: 0 8px 18px rgba(212,175,55,0.3);
}
.mini-card.selected {
  transform: translateY(-10px);
  border-color: #f4e4bc;
  box-shadow: 0 10px 22px rgba(212,175,55,0.6), 0 0 0 2px rgba(244,228,188,0.4);
  cursor: default;
}
.mini-card.locked { cursor: not-allowed; opacity: 0.55; }
.mini-card .badge {
  position: absolute;
  top: -8px;
  right: -8px;
  width: 26px;
  height: 26px;
  background: #d4af37;
  color: #1a0a3a;
  border-radius: 50%;
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 14px;
  font-weight: 700;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.mini-card.selected .badge { display: flex; }

/* Reading stage */
.reading {
  background: linear-gradient(135deg, rgba(42,14,90,0.55) 0%, rgba(10,4,32,0.7) 100%);
  border: 1px solid rgba(212,175,55,0.35);
  border-radius: 16px;
  padding: 36px;
  margin: 0 auto 24px;
  max-width: 760px;
}
.reading h2 {
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 20px;
  text-align: center;
  color: #d4af37;
  margin-bottom: 12px;
  letter-spacing: 0.2em;
  font-weight: 400;
  line-height: 1.6;
}
.worry-echo {
  background: rgba(10,4,32,0.5);
  border-left: 3px solid #d4af37;
  padding: 14px 18px;
  margin: 18px 0 28px;
  font-size: 14px;
  line-height: 1.8;
  color: rgba(244,228,188,0.92);
  font-style: italic;
}
.worry-echo .label {
  font-style: normal;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: #d4af37;
  display: block;
  margin-bottom: 6px;
}
.cards-display {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 28px 0;
  flex-wrap: wrap;
  perspective: 1200px;
}
.card-slot { display: flex; flex-direction: column; align-items: center; }
.card-position {
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 13px;
  letter-spacing: 0.3em;
  color: #d4af37;
  margin-bottom: 12px;
}
.card {
  width: 150px;
  height: 230px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
}
.card.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  text-align: center;
}
.card-back {
  background:
    radial-gradient(circle at center, rgba(212,175,55,0.3) 0%, transparent 70%),
    linear-gradient(135deg, #2a0e5a 0%, #1a0a3a 50%, #2a0e5a 100%);
  border: 2px solid #d4af37;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.card-back::before {
  content: '✦';
  font-size: 64px;
  color: #d4af37;
  text-shadow: 0 0 20px rgba(212,175,55,0.8);
}
.card-front {
  transform: rotateY(180deg);
  background: linear-gradient(135deg, #f4e4bc 0%, #e8d49a 100%);
  color: #2a0e5a;
  border: 2px solid #d4af37;
  box-shadow: 0 10px 40px rgba(212,175,55,0.4);
}
.card-front .roman {
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 16px;
  letter-spacing: 0.2em;
  color: #6b3fa0;
}
.card-front .symbol { font-size: 50px; margin: 8px 0; }
.card-front .name {
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: #2a0e5a;
}
.card-front .name-en {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #6b3fa0;
  margin-top: 5px;
  font-style: italic;
}
.card-reading {
  margin-bottom: 22px;
  padding-bottom: 22px;
  border-bottom: 1px solid rgba(212,175,55,0.2);
}
.card-reading:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.card-reading .position {
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 13px;
  letter-spacing: 0.3em;
  color: #d4af37;
  margin-bottom: 6px;
}
.card-reading .card-name {
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 18px;
  color: #f4e4bc;
  margin-bottom: 10px;
  letter-spacing: 0.1em;
}
.card-reading .meaning {
  font-size: 14px;
  line-height: 1.9;
  color: rgba(244,228,188,0.92);
}
.synthesis {
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid rgba(212,175,55,0.4);
  text-align: center;
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 15px;
  line-height: 2;
  color: #f4e4bc;
}
.life-path {
  margin-top: 24px;
  padding: 20px;
  background: rgba(10,4,32,0.5);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 12px;
}
.life-path .number-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 10px;
}
.life-path .number {
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 36px;
  color: #d4af37;
  line-height: 1;
  flex-shrink: 0;
  text-shadow: 0 0 16px rgba(212,175,55,0.4);
}
.life-path .number-meta {
  font-size: 11px;
  letter-spacing: 0.3em;
  color: #d4af37;
}
.life-path .number-name {
  font-family: "Hiragino Mincho ProN", serif;
  font-size: 16px;
  color: #f4e4bc;
  margin-top: 2px;
  letter-spacing: 0.15em;
}
.life-path .desc {
  font-size: 13px;
  line-height: 1.9;
  color: rgba(244,228,188,0.88);
}
.actions { text-align: center; margin-top: 24px; }
.btn {
  background: transparent;
  border: 1px solid #d4af37;
  color: #d4af37;
  padding: 12px 32px;
  font-family: inherit;
  font-size: 14px;
  letter-spacing: 0.2em;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s;
  margin: 0 8px;
}
.btn:hover {
  background: #d4af37;
  color: #1a0a3a;
  box-shadow: 0 0 20px rgba(212,175,55,0.5);
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn:disabled:hover { background: transparent; color: #d4af37; box-shadow: none; }

@media (max-width: 700px) {
  h1 { font-size: 22px; letter-spacing: 0.2em; }
  .form-wrap { padding: 28px 20px; }
  .theme-radio { grid-template-columns: 1fr; }
  .card { width: 110px; height: 170px; }
  .card-front .symbol { font-size: 38px; }
  .card-back::before { font-size: 48px; }
  .reading { padding: 24px 18px; }
  .cards-display { gap: 12px; }
  .card-pool { grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 8px; }
  .mini-card::before { font-size: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>パーソナル・タロット</h1>
  <p class="subtitle">— PERSONALIZED THREE CARD READING —</p>

  <section id="stage-input" class="stage active">
    <div class="form-wrap">
      <p class="form-prompt">あなたの情報をお聞かせください</p>
      <form id="input-form">
        <div class="field">
          <label for="f-name">お 名 前</label>
          <input type="text" id="f-name" required placeholder="例: 山田 太郎">
        </div>
        <div class="field">
          <label for="f-birth">生 年 月 日</label>
          <input type="date" id="f-birth" required>
        </div>
        <div class="field">
          <legend>占 う テ ー マ</legend>
          <div class="theme-radio" id="theme-radio">
            <label><input type="radio" name="theme" value="love" required><span class="ico">💕</span>恋 愛 運</label>
            <label><input type="radio" name="theme" value="work"><span class="ico">💼</span>仕 事 運</label>
            <label><input type="radio" name="theme" value="general"><span class="ico">🌙</span>総 合 運</label>
          </div>
        </div>
        <div class="field">
          <label for="f-worry">今 の お 悩 み ・ 知 り た い こ と</label>
          <textarea id="f-worry" placeholder="例: 今の彼との将来について悩んでいます"></textarea>
        </div>
        <button type="submit" class="btn-primary">占いを始める</button>
      </form>
    </div>
  </section>

  <section id="stage-select" class="stage">
    <div class="theme-tag-wrap"><span class="theme-tag" id="select-theme"></span></div>
    <p class="greeting" id="select-greeting"></p>
    <p class="hint">22枚の中から、直感で 過去 → 現在 → 未来 の順に3枚選んでください</p>
    <p class="counter" id="counter">0 / 3</p>
    <div class="card-pool" id="card-pool"></div>
    <div class="actions">
      <button class="btn" id="reveal-btn" disabled>結果を見る</button>
      <button class="btn" id="back-btn">入力に戻る</button>
    </div>
  </section>

  <section id="stage-reading" class="stage">
    <div class="reading">
      <h2 id="reading-title"></h2>
      <div class="theme-tag-wrap"><span class="theme-tag" id="reading-theme"></span></div>
      <div class="worry-echo" id="worry-echo" style="display:none;"></div>
      <div class="cards-display" id="cards-display"></div>
      <div id="reading-content"></div>
      <div class="synthesis" id="synthesis"></div>
      <div class="life-path" id="life-path"></div>
    </div>
    <div class="actions">
      <button class="btn" id="reset-btn">最初から占い直す</button>
    </div>
  </section>
</div>

<script>
(function () {
  "use strict";

  var CARDS = [
    {id:0, name:"愚者", en:"The Fool", roman:"0", symbol:"🌟",
      love:"先入観なく恋に飛び込める時。新しい出会いの予感。直感を信じて動いて。",
      work:"未経験の挑戦が吉。型にはまらず自由な発想で動こう。",
      general:"純粋さと冒険心が運を開く。一歩を恐れない時。"},
    {id:1, name:"魔術師", en:"The Magician", roman:"Ⅰ", symbol:"⚡",
      love:"自分の魅力を最大限に発揮できる。意思を持ってアプローチを。",
      work:"スキルとアイデアが結実。主体的に動けば成果に直結する。",
      general:"創造の力が宿る時。望むものを引き寄せられる。"},
    {id:2, name:"女教皇", en:"The High Priestess", roman:"Ⅱ", symbol:"🌙",
      love:"静かに想いを温める時期。焦らず相手をよく観察して。",

    {id:3, name:"女帝", en:"The Empress", roman:"Ⅲ", symbol:"🌹",
      love:"愛情に満ちた関係が育つ。豊かな感情表現を大切に。",

    {id:4, name:"皇帝", en:"The Emperor", roman:"Ⅳ", symbol:"👑",
      love:"主導権を持って関係を築く時。誠実さが信頼に繋がる。",
      work:"統率力とリーダーシップが評価される。決断の時。",
      general:"安定と支配の運気。基盤を築き上げる時期。"},
    {id:5, name:"教皇", en:"The Hierophant", roman:"Ⅴ", symbol:"⛪",
      love:"伝統的で誠実な関係。家族の理解も得られる。",

    {id:6, name:"恋人", en:"The Lovers", roman:"Ⅵ", symbol:"💕",
      love:"運命的な出会い、深い結びつき。大切な選択の時。",
      work:"パートナーシップが成功の鍵。協力者と組む時期。",

    {id:7, name:"戦車", en:"The Chariot", roman:"Ⅶ", symbol:"⚔️",

      general:"勝利と前進。意志の力で道を切り開ける。"},
    {id:8, name:"力", en:"Strength", roman:"Ⅷ", symbol:"🦁",
      love:"穏やかな強さで相手の心を動かせる。優しい忍耐を。",
      work:"内なる力で困難を乗り越える。粘り強さが鍵となる。",
      general:"理性と感情の調和。本当の強さは優しさにある。"},
    {id:9, name:"隠者", en:"The Hermit", roman:"Ⅸ", symbol:"🕯️",
      love:"自分と向き合う時間が必要。一人の時間も大切に。",
      work:"独自の道を究める時。専門性を深めると道が開く。",
      general:"内省と探求の時期。答えは自分の中にある。"},
    {id:10, name:"運命の輪", en:"Wheel of Fortune", roman:"Ⅹ", symbol:"🎡",
      love:"運命的な転機が訪れる。予期せぬ展開を受け入れて。",
      work:"流れが変わる時。チャンスを逃さない準備を。",
      general:"大きな変化の波。流れに乗ることが幸運の鍵。"},
    {id:11, name:"正義", en:"Justice", roman:"Ⅺ", symbol:"⚖️",
      love:"公平でバランスの取れた関係。正直なコミュニケーションを。",
      work:"公正な判断が求められる。これまでの行いが結果に表れる。",
      general:"バランスと公平の時。因果の法則が働いている。"},
    {id:12, name:"吊るされた男", en:"The Hanged Man", roman:"Ⅻ", symbol:"⏳",
      love:"待つことが必要な時期。視点を変えれば見える真実が。",
      work:"停滞を感じても無駄ではない。学びの時間と捉えて。",
      general:"忍耐と発想の転換。逆さから見ることで見えるものがある。"},
    {id:13, name:"死神", en:"Death", roman:"ⅩⅢ", symbol:"💀",
      love:"古い関係性の終わりが新しい愛を呼ぶ。手放す勇気を。",
      work:"区切りと変革の時。終わらせることで次が始まる。",
      general:"終焉と再生。古いものを手放してこそ前進できる。"},
    {id:14, name:"節制", en:"Temperance", roman:"ⅩⅣ", symbol:"🍷",
      love:"穏やかで調和のとれた関係。お互いを尊重し合えている。",
      work:"バランス感覚を活かして調整役に。協調性が評価される。",
      general:"中庸と融合。極端を避け、調和を保つ時。"},
    {id:15, name:"悪魔", en:"The Devil", roman:"ⅩⅤ", symbol:"😈",
      love:"強い欲望と執着。本当に望む関係か見極めて。",
      work:"目先の利益に縛られていないか。本質を見直す時。",
      general:"束縛からの解放が課題。自由になる選択肢は常にある。"},
    {id:16, name:"塔", en:"The Tower", roman:"ⅩⅥ", symbol:"🗼",
      love:"突然の変化や衝撃。古い思い込みが崩れる時。",
      work:"想定外の出来事。しかし崩壊は新しい構築のための前段階。",
      general:"破壊と気づき。瓦礫の中から本質が見えてくる。"},
    {id:17, name:"星", en:"The Star", roman:"ⅩⅦ", symbol:"⭐",
      love:"理想の愛が近づく。希望を持ち続けて。",
      work:"目指す未来への道筋が見える。インスピレーションの時。",
      general:"希望と癒し。夜空の星のように静かな導きがある。"},
    {id:18, name:"月", en:"The Moon", roman:"ⅩⅧ", symbol:"🌕",
      love:"曖昧さや不安。直感を信じつつも事実確認を。",
      work:"見えないものに惑わされやすい時。冷静さを保って。",
      general:"幻想と真実の境界。潜在意識からのメッセージに注意。"},
    {id:19, name:"太陽", en:"The Sun", roman:"ⅩⅨ", symbol:"☀️",
      love:"幸福で満たされた関係。喜びを素直に表現して。",
      work:"成功と達成。これまでの努力が光となって輝く。",
      general:"歓喜と達成。すべてが明るく照らされる祝福の時。"},
    {id:20, name:"審判", en:"Judgement", roman:"ⅩⅩ", symbol:"🎺",
      love:"過去の関係への気づきと再生。復縁の可能性も。",
      work:"これまでの努力が認められる時。再起と評価の機会。",
      general:"覚醒と復活。過去を受け入れ、新しい段階へ。"},
    {id:21, name:"世界", en:"The World", roman:"ⅩⅪ", symbol:"🌍",
      love:"完成された愛。長期的な関係への移行も。",
      work:"プロジェクトの完成と達成。次のステージへの準備が整う。",
      general:"完全と統合。一つのサイクルの完成。"}
  ];

  var THEMES = {
    love:    { label: "恋 愛 運", icon: "💕" },
    work:    { label: "仕 事 運", icon: "💼" },
    general: { label: "総 合 運", icon: "🌙" }
  };

  var POSITIONS = ["過 去", "現 在", "未 来"];

  var LIFE_PATH = {
    1:  { name: "開拓者の道", desc: "独立心と推進力で人生を切り開く星のもとに生まれています。リーダーとしての資質があり、新しい道を作る力を秘めています。" },
    2:  { name: "調和の道", desc: "繊細な感受性と協調性を持ち、人と人を繋ぐ役割を担います。サポートする立場で本領を発揮するタイプ。" },
    3:  { name: "表現者の道", desc: "創造性と楽観性に満ちた星のもとに。自己表現を通じて周囲を明るくする力を持っています。" },
    4:  { name: "建設者の道", desc: "堅実さと忍耐力で着実に積み上げていくタイプ。基盤を築く力に長けています。" },
    5:  { name: "自由の道", desc: "変化と冒険を求める魂。多様な経験を通じて成長する人生が用意されています。" },
    6:  { name: "愛と責任の道", desc: "深い愛情で周囲を包み込む使命を持つ星。家族や仲間への責任感が人生のテーマです。" },
    7:  { name: "探求者の道", desc: "真理を追い求める哲学的な魂。一人の時間で深い洞察を得るタイプです。" },
    8:  { name: "達成者の道", desc: "物質的・社会的成功を引き寄せる強い力を持ちます。実力で道を切り開く星。" },
    9:  { name: "完成者の道", desc: "広い視野と慈愛の心を持ち、人々のために貢献する人生のテーマがあります。" },
    11: { name: "霊感のマスター", desc: "強い直感力と霊性を持つマスターナンバー。インスピレーションを通じて人々を導く役割を持ちます。" },
    22: { name: "建設のマスター", desc: "大きなビジョンを現実化する力を持つマスターナンバー。理想を形にする使命があります。" },
    33: { name: "愛のマスター", desc: "無条件の愛で人々を癒す最高位のマスターナンバー。深い慈愛が人生のテーマです。" }
  };

  var SYNTHESIS = {
    love: function(c, name) {
      return (name?name+"さん、":"") + "「"+c[0].name+"」が示す過去の経験が、「"+c[1].name+"」という今のあなたを形づくっています。やがて訪れる「"+c[2].name+"」のエネルギーを受け入れることで、愛はさらに深く育っていくでしょう。";
    },
    work: function(c, name) {
      return (name?name+"さん、":"") + "過去の「"+c[0].name+"」での歩みが、現在の「"+c[1].name+"」という状況を生んでいます。これから向かう「"+c[2].name+"」の流れに乗ることで、あなたの仕事は次の段階へ進みます。";
    },
    general: function(c, name) {
      return (name?name+"さん、":"") + "「"+c[0].name+"」の経験が「"+c[1].name+"」の今を形づくり、「"+c[2].name+"」へと導いていきます。今のあなたに必要なのは、カードが示すメッセージを受け取り、流れを信じること。";
    }
  };

  var $ = function(id) { return document.getElementById(id); };

  var state = {
    name: "",
    birthdate: "",
    theme: "",
    worry: "",
    pool: [],
    selected: []
  };

  function calcLifePath(birth) {
    if (!birth) return null;
    var digits = birth.replace(/-/g, "");
    var sum = 0;
    for (var i = 0; i < digits.length; i++) sum += parseInt(digits[i], 10);
    while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
      var s = 0;
      var str = String(sum);
      for (var j = 0; j < str.length; j++) s += parseInt(str[j], 10);
      sum = s;
    }
    return sum;
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  // Theme radio styling
  document.querySelectorAll("#theme-radio input").forEach(function(input) {
    input.addEventListener("change", function() {
      document.querySelectorAll("#theme-radio label").forEach(function(l) {
        l.classList.remove("checked");
      });
      input.parentElement.classList.add("checked");
    });
  });

  // Form submit
  $("input-form").addEventListener("submit", function(e) {
    e.preventDefault();
    state.name = $("f-name").value.trim();
    state.birthdate = $("f-birth").value;
    var checked = document.querySelector("#theme-radio input:checked");
    if (!checked) return;
    state.theme = checked.value;
    state.worry = $("f-worry").value.trim();

    state.pool = shuffle(CARDS);
    state.selected = [];

    showStage("select");
    renderSelectStage();
  });

  $("back-btn").addEventListener("click", function() {
    showStage("input");
  });

  function renderSelectStage() {
    var theme = THEMES[state.theme];
    $("select-theme").textContent = theme.icon + "  " + theme.label;
    $("select-greeting").textContent = state.name + " さん、運命のカードを選んでください";
    updateCounter();

    var pool = $("card-pool");
    pool.innerHTML = "";

    state.pool.forEach(function(card, i) {
      var el = document.createElement("div");
      el.className = "mini-card";

      var badge = document.createElement("div");
      badge.className = "badge";
      el.appendChild(badge);

      el.addEventListener("click", function() {
        if (el.classList.contains("selected")) return;
        if (state.selected.length >= 3) return;
        state.selected.push({ card: card, el: el });
        el.classList.add("selected");
        badge.textContent = state.selected.length;
        updateCounter();
        if (state.selected.length === 3) {
          document.querySelectorAll(".mini-card").forEach(function(m) {
            if (!m.classList.contains("selected")) m.classList.add("locked");
          });
          $("reveal-btn").disabled = false;
        }
      });

      pool.appendChild(el);
    });

    $("reveal-btn").disabled = true;
  }

  function updateCounter() {
    $("counter").textContent = state.selected.length + " / 3";
  }

  $("reveal-btn").addEventListener("click", function() {
    showStage("reading");
    renderReading();
  });

  function summarize(text, max) {
    if (text.length <= max) return text;
    return text.slice(0, max) + "…";
  }

  function renderReading() {
    var theme = THEMES[state.theme];
    var picked = state.selected.map(function(s) { return s.card; });
    var name = state.name;

    $("reading-title").textContent = "✦ " + (name ? name + " さんの" : "") + "占い結果 ✦";
    $("reading-theme").textContent = theme.icon + "  " + theme.label;

    // 悩み echo
    var worryEl = $("worry-echo");
    if (state.worry) {
      worryEl.style.display = "block";
      worryEl.innerHTML = "";
      var lbl = document.createElement("span");
      lbl.className = "label";
      lbl.textContent = "ご 相 談";
      var txt = document.createElement("span");
      txt.textContent = "「" + state.worry + "」";
      worryEl.appendChild(lbl);
      worryEl.appendChild(txt);
    } else {
      worryEl.style.display = "none";
    }

    // カード表示（伏せ→順にめくる）
    var display = $("cards-display");
    display.innerHTML = "";
    picked.forEach(function(card, i) {
      var slot = document.createElement("div");
      slot.className = "card-slot";

      var pos = document.createElement("div");
      pos.className = "card-position";
      pos.textContent = POSITIONS[i];
      slot.appendChild(pos);

      var cardEl = document.createElement("div");
      cardEl.className = "card";

      var back = document.createElement("div");
      back.className = "card-face card-back";

      var front = document.createElement("div");
      front.className = "card-face card-front";

      var roman = document.createElement("div");
      roman.className = "roman";
      roman.textContent = card.roman;
      var symbol = document.createElement("div");
      symbol.className = "symbol";
      symbol.textContent = card.symbol;
      var nameDiv = document.createElement("div");
      nameDiv.className = "name";
      nameDiv.textContent = card.name;
      var nameEn = document.createElement("div");
      nameEn.className = "name-en";
      nameEn.textContent = card.en;
      front.appendChild(roman);
      front.appendChild(symbol);
      front.appendChild(nameDiv);
      front.appendChild(nameEn);

      cardEl.appendChild(back);
      cardEl.appendChild(front);
      slot.appendChild(cardEl);
      display.appendChild(slot);

      setTimeout(function() {
        cardEl.classList.add("flipped");
      }, 400 + i * 600);
    });

    // 各カードの解釈
    var content = $("reading-content");
    content.innerHTML = "";
    picked.forEach(function(card, i) {
      var div = document.createElement("div");
      div.className = "card-reading";

      var pos = document.createElement("div");
      pos.className = "position";
      pos.textContent = POSITIONS[i] + "  —  " + card.symbol;

      var nm = document.createElement("div");
      nm.className = "card-name";
      nm.textContent = card.name + "    " + card.roman;

      var meaning = document.createElement("div");
      meaning.className = "meaning";
      var meaningText = card[state.theme];
      if (i === 0 && state.worry) {
        meaningText = "あなたのお悩み「" + summarize(state.worry, 20) + "」に対し、過去のあなたを示すこのカードは — " + meaningText;
      }
      meaning.textContent = meaningText;

      div.appendChild(pos);
      div.appendChild(nm);
      div.appendChild(meaning);
      content.appendChild(div);
    });

    // 総合メッセージ
    $("synthesis").textContent = SYNTHESIS[state.theme](picked, name);

    // ライフパスナンバー
    var lp = calcLifePath(state.birthdate);
    var lpEl = $("life-path");
    if (lp && LIFE_PATH[lp]) {
      lpEl.style.display = "block";
      lpEl.innerHTML = "";

      var row = document.createElement("div");
      row.className = "number-row";

      var num = document.createElement("div");
      num.className = "number";
      num.textContent = lp;

      var meta = document.createElement("div");
      var label = document.createElement("div");
      label.className = "number-meta";
      label.textContent = "ライフパスナンバー";
      var nm = document.createElement("div");
      nm.className = "number-name";
      nm.textContent = LIFE_PATH[lp].name;
      meta.appendChild(label);
      meta.appendChild(nm);

      row.appendChild(num);
      row.appendChild(meta);

      var desc = document.createElement("div");
      desc.className = "desc";
      desc.textContent = LIFE_PATH[lp].desc + " 今回のタロットの結果も、" + (name?name+"さん本来の":"あなたの") + "「" + LIFE_PATH[lp].name + "」の流れと響き合っています。";

      lpEl.appendChild(row);
      lpEl.appendChild(desc);
    } else {
      lpEl.style.display = "none";
    }
  }

  function showStage(name) {
    document.querySelectorAll(".stage").forEach(function(s){
      s.classList.remove("active");
    });
    $("stage-" + name).classList.add("active");
    window.scrollTo({top: 0, behavior: "smooth"});
  }

  $("reset-btn").addEventListener("click", function() {
    showStage("input");
  });
})();
</script>
</body>
</html>
